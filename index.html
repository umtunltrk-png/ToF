<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fortress Fighters</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f1a;
      --panel: #151829;
      --border: #2a2f4a;
      --accent: #f0a500;
      --accent2: #e05c00;
      --blue: #3a7bd5;
      --green: #2ecc71;
      --red: #e74c3c;
      --text: #e8eaf0;
      --muted: #7a7f9a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== TOP BAR ===== */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    #topbar .user-info { display: flex; align-items: center; gap: 8px; }
    #topbar .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
    }
    #topbar .username { font-size: 14px; font-weight: 600; }
    #topbar .level-badge {
      background: var(--accent); color: #000;
      font-size: 11px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px;
    }
    .resources {
      display: flex; gap: 10px;
    }
    .res-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600;
    }
    .res-item .icon { font-size: 15px; }

    /* ===== TABS ===== */
    #tabs {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
    }
    .tab-btn {
      flex: 1; padding: 10px 4px 8px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 10px; font-weight: 600;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      transition: color 0.2s;
    }
    .tab-btn .t-icon { font-size: 22px; }
    .tab-btn.active { color: var(--accent); }

    /* ===== MAIN CONTENT ===== */
    #main {
      margin-top: 60px;
      margin-bottom: 70px;
      padding: 12px;
    }

    /* ===== SCREENS ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== CASTLE SCREEN ===== */
    .castle-visual {
      background: linear-gradient(180deg, #1a1f3a 0%, #0d1020 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .castle-visual::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center top, rgba(240,165,0,0.12) 0%, transparent 70%);
    }
    .castle-emoji { font-size: 80px; line-height: 1; display: block; }
    .castle-name {
      font-size: 20px; font-weight: 700; margin-top: 8px;
      color: var(--accent);
    }
    .castle-level { font-size: 13px; color: var(--muted); }
    .xp-bar-wrap { margin-top: 12px; }
    .xp-bar {
      height: 6px; background: var(--border); border-radius: 3px;
      overflow: hidden;
    }
    .xp-bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px; transition: width 0.4s;
    }
    .xp-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .section-title {
      font-size: 13px; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* ===== BUILDINGS GRID ===== */
    .buildings-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .building-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
      position: relative;
    }
    .building-card:active { transform: scale(0.97); }
    .building-card.can-upgrade { border-color: var(--accent); }
    .building-card .b-header { display: flex; align-items: center; justify-content: space-between; }
    .building-card .b-icon { font-size: 28px; }
    .building-card .b-lvl {
      font-size: 11px; color: var(--muted);
      background: var(--bg); padding: 2px 6px; border-radius: 8px;
    }
    .building-card .b-name { font-size: 13px; font-weight: 600; margin-top: 6px; }
    .building-card .b-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .building-card .upgrade-btn {
      width: 100%; margin-top: 8px; padding: 6px;
      border: none; border-radius: 8px;
      background: var(--accent); color: #000;
      font-size: 11px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .building-card .upgrade-btn:disabled {
      background: var(--border); color: var(--muted); cursor: not-allowed;
    }
    .upgrade-progress {
      height: 3px; background: var(--border); border-radius: 2px;
      margin-top: 6px; overflow: hidden;
    }
    .upgrade-progress-fill {
      height: 100%; background: var(--blue); border-radius: 2px;
    }

    /* ===== TROOPS SCREEN ===== */
    .troop-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
    }
    .troop-card .t-icon { font-size: 40px; flex-shrink: 0; }
    .troop-card .t-info { flex: 1; }
    .troop-card .t-name { font-size: 15px; font-weight: 700; }
    .troop-card .t-stats { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .troop-card .t-count { font-size: 20px; font-weight: 700; color: var(--accent); }
    .troop-card .t-actions { display: flex; flex-direction: column; gap: 6px; }
    .troop-btn {
      padding: 6px 12px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
    }
    .troop-btn.train { background: var(--blue); color: #fff; }
    .troop-btn.train:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ===== BATTLE SCREEN ===== */
    .battle-header {
      background: linear-gradient(135deg, #2a0a0a, #1a0505);
      border: 1px solid #5a1a1a;
      border-radius: 16px; padding: 16px;
      text-align: center; margin-bottom: 14px;
    }
    .battle-header h2 { font-size: 18px; font-weight: 700; color: var(--red); }
    .battle-header p { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .enemy-list { }
    .enemy-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color 0.2s;
    }
    .enemy-card:active { border-color: var(--red); }
    .enemy-card .e-icon { font-size: 36px; }
    .enemy-card .e-info { flex: 1; }
    .enemy-card .e-name { font-size: 14px; font-weight: 700; }
    .enemy-card .e-power { font-size: 11px; color: var(--muted); }
    .enemy-card .e-reward { text-align: right; }
    .enemy-card .e-reward .r-gold { color: var(--accent); font-size: 13px; font-weight: 700; }
    .enemy-card .e-reward .r-xp { color: var(--green); font-size: 11px; }
    .difficulty-badge {
      padding: 3px 8px; border-radius: 8px;
      font-size: 10px; font-weight: 700;
      display: inline-block; margin-top: 4px;
    }
    .diff-easy { background: rgba(46,204,113,0.2); color: var(--green); }
    .diff-medium { background: rgba(240,165,0,0.2); color: var(--accent); }
    .diff-hard { background: rgba(231,76,60,0.2); color: var(--red); }

    /* ===== BATTLE MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px; width: 100%; max-width: 360px;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal .battle-vs {
      display: flex; align-items: center; justify-content: space-around;
      padding: 16px 0;
    }
    .battle-vs .combatant { text-align: center; }
    .battle-vs .combatant .icon { font-size: 50px; }
    .battle-vs .combatant .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .battle-vs .vs-text { font-size: 22px; font-weight: 900; color: var(--red); }
    .power-compare {
      background: var(--bg); border-radius: 10px; padding: 12px;
      margin-bottom: 16px;
    }
    .power-compare .p-row {
      display: flex; justify-content: space-between;
      font-size: 13px; margin-bottom: 6px;
    }
    .power-compare .p-row:last-child { margin-bottom: 0; }
    .power-bar-wrap { display: flex; gap: 4px; margin-top: 4px; }
    .power-bar-wrap .bar-seg {
      height: 4px; flex: 1; border-radius: 2px; background: var(--border);
    }
    .power-bar-wrap .bar-seg.fill-player { background: var(--blue); }
    .power-bar-wrap .bar-seg.fill-enemy { background: var(--red); }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-attack { background: var(--red); color: #fff; }
    .btn-cancel { background: var(--border); color: var(--text); }

    /* ===== BATTLE RESULT ===== */
    .result-modal { text-align: center; }
    .result-modal .result-icon { font-size: 64px; margin-bottom: 8px; }
    .result-modal .result-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .result-modal .result-title.win { color: var(--green); }
    .result-modal .result-title.lose { color: var(--red); }
    .result-modal .result-msg { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .result-rewards {
      background: var(--bg); border-radius: 12px; padding: 12px;
      margin-bottom: 16px;
    }
    .result-rewards .reward-row {
      display: flex; justify-content: space-between;
      font-size: 14px; margin-bottom: 6px;
    }

    /* ===== CLAN SCREEN ===== */
    .clan-header {
      background: linear-gradient(135deg, #0a1f2a, #051015);
      border: 1px solid #1a4a5a;
      border-radius: 16px; padding: 16px; margin-bottom: 14px; text-align: center;
    }
    .clan-icon { font-size: 60px; display: block; }
    .clan-name { font-size: 20px; font-weight: 700; color: var(--blue); margin-top: 6px; }
    .clan-tag { font-size: 12px; color: var(--muted); }
    .clan-stats { display: flex; justify-content: space-around; margin-top: 12px; }
    .clan-stat { text-align: center; }
    .clan-stat .sv { font-size: 18px; font-weight: 700; color: var(--accent); }
    .clan-stat .sl { font-size: 11px; color: var(--muted); }

    .member-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .member-card .m-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), #2a5fb5);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
    }
    .member-card .m-name { font-size: 14px; font-weight: 600; }
    .member-card .m-power { font-size: 12px; color: var(--muted); }
    .member-card .m-rank {
      margin-left: auto;
      font-size: 18px;
    }

    /* ===== QUESTS SCREEN ===== */
    .quest-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      margin-bottom: 10px;
    }
    .quest-card .q-header { display: flex; align-items: flex-start; justify-content: space-between; }
    .quest-card .q-icon { font-size: 28px; }
    .quest-card .q-info { flex: 1; margin-left: 10px; }
    .quest-card .q-name { font-size: 14px; font-weight: 700; }
    .quest-card .q-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .quest-card .q-reward { text-align: right; }
    .quest-card .q-reward .qr-gold { color: var(--accent); font-size: 13px; font-weight: 700; }
    .quest-progress { margin-top: 10px; }
    .q-prog-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .q-prog-fill { height: 100%; background: linear-gradient(90deg, var(--green), #27ae60); border-radius: 3px; transition: width 0.4s; }
    .q-prog-label { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; justify-content: space-between; }
    .claim-btn {
      width: 100%; margin-top: 10px; padding: 8px;
      border: none; border-radius: 8px;
      background: var(--green); color: #fff;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .claim-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

    /* ===== TOASTS ===== */
    #toast-container {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 300; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 16px;
      font-size: 13px; font-weight: 600;
      white-space: nowrap;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.info { border-color: var(--accent); color: var(--accent); }
    @keyframes toastIn { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

    /* ===== IDLE INCOME POPUP ===== */
    .idle-popup {
      position: fixed; inset: 0; z-index: 150;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .idle-popup .idle-box {
      background: var(--panel); border: 2px solid var(--accent);
      border-radius: 20px; padding: 28px; text-align: center;
      width: 100%; max-width: 320px;
    }
    .idle-popup .idle-icon { font-size: 56px; }
    .idle-popup h3 { font-size: 18px; font-weight: 700; margin: 10px 0 4px; color: var(--accent); }
    .idle-popup p { font-size: 13px; color: var(--muted); }
    .idle-popup .idle-amount { font-size: 32px; font-weight: 900; color: var(--accent); margin: 12px 0; }
    .idle-popup .collect-btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-size: 16px; font-weight: 800; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="user-info">
    <div class="avatar" id="user-avatar">?</div>
    <div>
      <div class="username" id="user-name">Komutan</div>
      <div class="level-badge" id="user-level-badge">Sv. 1</div>
    </div>
  </div>
  <div class="resources">
    <div class="res-item"><span class="icon">🪙</span><span id="res-gold">500</span></div>
    <div class="res-item"><span class="icon">🌾</span><span id="res-food">200</span></div>
    <div class="res-item"><span class="icon">⚔️</span><span id="res-power">0</span></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CASTLE SCREEN -->
  <div class="screen active" id="screen-castle">
    <div class="castle-visual">
      <span class="castle-emoji" id="castle-emoji">🏰</span>
      <div class="castle-name" id="castle-name">Kale</div>
      <div class="castle-level" id="castle-level-text">Seviye 1</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar"><div class="xp-bar-fill" id="xp-fill" style="width:0%"></div></div>
        <div class="xp-label" id="xp-label">0 / 100 XP</div>
      </div>
    </div>

    <div class="section-title">Binalar</div>
    <div class="buildings-grid" id="buildings-grid"></div>
  </div>

  <!-- TROOPS SCREEN -->
  <div class="screen" id="screen-troops">
    <div class="section-title">Birlikler</div>
    <div id="troops-list"></div>
  </div>

  <!-- BATTLE SCREEN -->
  <div class="screen" id="screen-battle">
    <div class="battle-header">
      <h2>⚔️ Savaş Alanı</h2>
      <p>Düşmanları yenerek altın ve XP kazan!</p>
    </div>
    <div class="section-title">Düşmanlar</div>
    <div id="enemy-list"></div>
  </div>

  <!-- CLAN SCREEN -->
  <div class="screen" id="screen-clan">
    <div class="clan-header">
      <span class="clan-icon">🛡️</span>
      <div class="clan-name" id="clan-name-display">Demir Kalkan</div>
      <div class="clan-tag">#DEMİR • 18/30 üye</div>
      <div class="clan-stats">
        <div class="clan-stat"><div class="sv">1,250</div><div class="sl">Güç</div></div>
        <div class="clan-stat"><div class="sv">3</div><div class="sl">Savaş Kazandı</div></div>
        <div class="clan-stat"><div class="sv">2</div><div class="sl">Sezon</div></div>
      </div>
    </div>
    <div class="section-title">Üyeler</div>
    <div id="members-list"></div>
  </div>

  <!-- QUESTS SCREEN -->
  <div class="screen" id="screen-quests">
    <div class="section-title">Günlük Görevler</div>
    <div id="quests-list"></div>
  </div>

</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('castle')" id="tab-castle">
    <span class="t-icon">🏰</span>Kale
  </button>
  <button class="tab-btn" onclick="switchTab('troops')" id="tab-troops">
    <span class="t-icon">⚔️</span>Birlikler
  </button>
  <button class="tab-btn" onclick="switchTab('battle')" id="tab-battle">
    <span class="t-icon">🔥</span>Savaş
  </button>
  <button class="tab-btn" onclick="switchTab('clan')" id="tab-clan">
    <span class="t-icon">🛡️</span>Klan
  </button>
  <button class="tab-btn" onclick="switchTab('quests')" id="tab-quests">
    <span class="t-icon">📋</span>Görevler
  </button>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script>
// ============================================================
//  GAME STATE
// ============================================================
const DEFAULT_STATE = {
  player: {
    name: 'Komutan',
    level: 1,
    xp: 0,
    xpNext: 100,
    gold: 500,
    food: 200,
    lastOnline: Date.now()
  },
  buildings: {
    castle:    { level: 1, upgrading: false, upgradeEnd: 0 },
    barracks:  { level: 1, upgrading: false, upgradeEnd: 0 },
    farm:      { level: 1, upgrading: false, upgradeEnd: 0 },
    mine:      { level: 1, upgrading: false, upgradeEnd: 0 },
    walls:     { level: 1, upgrading: false, upgradeEnd: 0 },
    forge:     { level: 0, upgrading: false, upgradeEnd: 0 }
  },
  troops: {
    swordsman:  { count: 5 },
    archer:     { count: 3 },
    cavalry:    { count: 0 },
    catapult:   { count: 0 }
  },
  quests: {}
};

// Deep clone on load
let G = deepClone(DEFAULT_STATE);

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

// Load/save from localStorage
function saveGame() { localStorage.setItem('ff_save', JSON.stringify(G)); }
function loadGame() {
  try {
    const raw = localStorage.getItem('ff_save');
    if (raw) G = JSON.parse(raw);
  } catch(e) { console.warn('Save load error', e); }
}

// ============================================================
//  CONFIG DATA
// ============================================================
const BUILDINGS_CONFIG = {
  castle: {
    name: 'Kale', icon: '🏰',
    desc: 'Ana kalen. Diğer binaların max seviyesini belirler.',
    maxLevel: 10,
    upgradeCost: (lvl) => ({ gold: 200 * lvl * lvl, food: 50 * lvl }),
    upgradeTime: (lvl) => lvl * 30, // seconds
    bonus: (lvl) => `Maks seviye +${lvl}`
  },
  barracks: {
    name: 'Kışla', icon: '⚔️',
    desc: 'Asker eğitmek için. Seviye arttıkça güçlü birimler açılır.',
    maxLevel: 8,
    upgradeCost: (lvl) => ({ gold: 150 * lvl, food: 30 * lvl }),
    upgradeTime: (lvl) => lvl * 20,
    bonus: (lvl) => `Eğitim kapasitesi +${lvl * 2}`
  },
  farm: {
    name: 'Çiftlik', icon: '🌾',
    desc: 'Yiyecek üretir. Askerlerin geçimini sağlar.',
    maxLevel: 8,
    upgradeCost: (lvl) => ({ gold: 100 * lvl, food: 10 }),
    upgradeTime: (lvl) => lvl * 15,
    bonus: (lvl) => `+${lvl * 10} yiyecek/saat`
  },
  mine: {
    name: 'Maden', icon: '⛏️',

// ============================================================
//  COMPUTED POWER
// ============================================================
function calcTotalPower() {
  let p = 0;
  const tc = TROOPS_CONFIG;
  for (const [id, cfg] of Object.entries(tc)) {
    const cnt = G.troops[id]?.count || 0;
    p += cnt * (cfg.attack + cfg.defense);
  }
  // Building bonuses
  p += G.buildings.walls.level * 20;
  p += G.buildings.forge.level * 15;
  return p;
}

// ============================================================
//  IDLE INCOME
// ============================================================
function processIdleIncome() {
  const now = Date.now();
  const elapsed = (now - G.player.lastOnline) / 1000 / 3600; // hours
  if (elapsed < 0.01) return 0; // < 36 seconds, skip

  const goldPerHour = (G.buildings.mine.level) * 15 + 10;
  const foodPerHour = (G.buildings.farm.level) * 10 + 5;
  const maxIdleHours = 8;
  const hours = Math.min(elapsed, maxIdleHours);

  const goldEarned = Math.floor(goldPerHour * hours);
  const foodEarned = Math.floor(foodPerHour * hours);

  G.player.gold += goldEarned;
  G.player.food += foodEarned;
  G.player.lastOnline = now;
  saveGame();

  return { gold: goldEarned, food: foodEarned, hours: hours.toFixed(1) };
}

// ============================================================
//  LEVEL UP
// ============================================================
function checkLevelUp() {
  while (G.player.xp >= G.player.xpNext) {
    G.player.xp -= G.player.xpNext;
    G.player.level++;
    G.player.xpNext = Math.floor(100 * Math.pow(1.4, G.player.level - 1));
    showToast(`🎉 Seviye ${G.player.level}! Tebrikler!`, 'success');
  }
}

function fmtNum(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(Math.floor(n));
}

function upgradeBuilding(id) {
  const cfg = BUILDINGS_CONFIG[id];
  const b = G.buildings[id];
  if (b.level >= cfg.maxLevel) return;
  if (b.upgrading && Date.now() < b.upgradeEnd) return;

  const cost = cfg.upgradeCost(b.level);
  if (G.player.gold < cost.gold || G.player.food < cost.food) {
    showToast('Yetersiz kaynak!', 'error'); return;
  }

  G.player.gold -= cost.gold;
  G.player.food -= cost.food;
  const time = cfg.upgradeTime(b.level) * 1000; // ms
  b.upgrading = true;
  b.upgradeEnd = Date.now() + time;

  // Simulate upgrade completion with setTimeout
  setTimeout(() => {
    b.level++;
    b.upgrading = false;
    b.upgradeEnd = 0;
    G.player.xp += 15 * b.level;
    checkLevelUp();
    questProgress('upgrade', 1);
    showToast(`✅ ${cfg.name} Seviye ${b.level}!`, 'success');
    saveGame();
    renderAll();
  }, time);

  showToast(`🏗️ ${cfg.name} yükseltiliyor...`, 'info');
  saveGame();
  renderAll();
}

function trainTroop(id) {
  const cfg = TROOPS_CONFIG[id];
  if (G.player.gold < cfg.cost.gold || G.player.food < cfg.cost.food) {
    showToast('Yetersiz kaynak!', 'error'); return;
  }
  if (G.buildings.barracks.level < cfg.requiresBarracks) {
    showToast(`Kışla Seviye ${cfg.requiresBarracks} gerekli!`, 'error'); return;
  }
  G.player.gold -= cfg.cost.gold;
  G.player.food -= cfg.cost.food;
  G.troops[id].count++;
  G.player.xp += 5;
  checkLevelUp();
  questProgress('train', 1);
  showToast(`+1 ${cfg.name} eğitildi!`, 'success');
  saveGame();
  renderAll();
}

function disbandTroop(id) {
  if (G.troops[id].count <= 0) return;
  G.troops[id].count--;
  const cfg = TROOPS_CONFIG[id];
  G.player.gold += Math.floor(cfg.cost.gold * 0.3);
  showToast(`${cfg.name} terhis edildi.`, 'info');
  saveGame();
  renderAll();
}

let activeBattle = null;

function openBattleModal(enemy) {
  activeBattle = enemy;
  const playerPower = calcTotalPower();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'battle-modal';

  const winChance = Math.min(95, Math.max(5, Math.round((playerPower / (playerPower + enemy.power)) * 100)));
  const segments = 10;
  const playerSegs = Math.round((playerPower / (playerPower + enemy.power)) * segments);

  let barHtml = '';
  for (let i = 0; i < segments; i++) {
    barHtml += `<div class="bar-seg ${i < playerSegs ? 'fill-player' : 'fill-enemy'}"></div>`;
  }

  overlay.innerHTML = `
    <div class="modal">
      <h3>⚔️ ${enemy.name}</h3>
      <p style="color:var(--muted);font-size:12px;margin-top:4px">${enemy.story}</p>
      <div class="battle-vs">
        <div class="combatant">
          <div class="icon">🏰</div>
          <div class="lbl">${G.player.name}</div>
          <div style="color:var(--blue);font-size:13px;font-weight:700">💪${fmtNum(playerPower)}</div>
        </div>
        <div class="vs-text">VS</div>
        <div class="combatant">
          <div class="icon">${enemy.icon}</div>
          <div class="lbl">${enemy.name}</div>
          <div style="color:var(--red);font-size:13px;font-weight:700">💪${enemy.power}</div>
        </div>
      </div>
      <div class="power-compare">
        <div class="p-row"><span>Kazanma şansı</span><span style="color:${winChance >= 50 ? 'var(--green)' : 'var(--red)'}">%${winChance}</span></div>
        <div class="power-bar-wrap">${barHtml}</div>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeBattleModal()">İptal</button>
        <button class="btn-attack" onclick="doBattle()">⚔️ Saldır!</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

function closeBattleModal() {
  const m = document.getElementById('battle-modal');
  if (m) m.remove();
  const r = document.getElementById('result-modal');
  if (r) r.remove();
  activeBattle = null;
}

function doBattle() {
  if (!activeBattle) return;
  const enemy = activeBattle;
  const playerPower = calcTotalPower();
  const winChance = Math.min(95, Math.max(5, (playerPower / (playerPower + enemy.power))));
  const won = Math.random() < winChance;

  closeBattleModal();

  if (won) {
    G.player.gold += enemy.reward.gold;
    G.player.xp += enemy.reward.xp;
    checkLevelUp();
    questProgress('battle', 1);
    saveGame();
    showResultModal(true, enemy);
  } else {
    // Lose some troops
    const troopTypes = Object.keys(G.troops).filter(t => G.troops[t].count > 0);
    if (troopTypes.length > 0) {
      const t = troopTypes[Math.floor(Math.random() * troopTypes.length)];
      const losses = Math.min(G.troops[t].count, Math.ceil(Math.random() * 3));
      G.troops[t].count -= losses;
    }
    saveGame();
    showResultModal(false, enemy);
  }
  renderAll();
}

function showResultModal(won, enemy) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'result-modal';

  overlay.innerHTML = `
    <div class="modal result-modal">
      <div class="result-icon">${won ? '🏆' : '💔'}</div>
      <div class="result-title ${won ? 'win' : 'lose'}">${won ? 'ZAFER!' : 'YENİLGİ'}</div>
      <div class="result-msg">${won ? `${enemy.name} bozguna uğratıldı!` : 'Ordun geri çekilmek zorunda kaldı...'}</div>
      ${won ? `
        <div class="result-rewards">
          <div class="reward-row"><span>🪙 Altın</span><span style="color:var(--accent)">+${enemy.reward.gold}</span></div>
          <div class="reward-row"><span>⭐ Deneyim</span><span style="color:var(--green)">+${enemy.reward.xp} XP</span></div>
        </div>
      ` : `
        <div class="result-rewards">
          <div class="reward-row"><span>💀 Kayıplar</span><span style="color:var(--red)">Asker kaybedildi</span></div>
        </div>
      `}
      <button class="collect-btn" style="width:100%;padding:12px;border:none;border-radius:10px;background:${won ? 'var(--green)' : 'var(--border)'};color:${won ? '#fff' : 'var(--text)'};font-size:15px;font-weight:700;cursor:pointer" onclick="closeBattleModal()">Devam Et</button>
    </div>
  `;
  document.body.appendChild(overlay);
}

// ============================================================
//  QUEST PROGRESS
// ============================================================
function questProgress(type, amount) {
  const today = new Date().toDateString();
  DAILY_QUESTS.forEach(q => {
    if (q.type !== type) return;
    if (!G.quests[q.id]) G.quests[q.id] = { progress: 0, claimed: false, date: today };
    if (G.quests[q.id].claimed) return;
    if (G.quests[q.id].date !== today) return;
    G.quests[q.id].progress = Math.min(q.target, G.quests[q.id].progress + amount);
  });
  saveGame();
}

function claimQuest(id) {
  const q = DAILY_QUESTS.find(x => x.id === id);
  if (!q) return;
  const saved = G.quests[id];
  if (!saved || saved.claimed || saved.progress < q.target) return;
  G.player.gold += q.reward.gold;
  G.player.xp += q.reward.xp;
  saved.claimed = true;
  checkLevelUp();
  showToast(`🎁 ${q.name} ödülü alındı!`, 'success');
  saveGame();
  renderAll();
}

  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'quests') renderQuests();
  if (tab === 'clan') renderClan();
}

// ============================================================
function showIdlePopup(earned) {
  if (earned.gold < 10 && earned.food < 10) return;
  const popup = document.createElement('div');
  popup.className = 'idle-popup';
  popup.innerHTML = `
    <div class="idle-box">
      <div class="idle-icon">⏰</div>
      <h3>Hoş Geldin, Komutan!</h3>
      <p>${earned.hours} saatlik yokluğunda kaynaklarını toplandı.</p>
      <div class="idle-amount">🪙 +${fmtNum(earned.gold)}</div>
      <div style="color:var(--green);font-size:18px;font-weight:700;margin-bottom:12px">🌾 +${fmtNum(earned.food)}</div>
      <button class="collect-btn" onclick="this.closest('.idle-popup').remove()">✅ Topla!</button>
    </div>
  `;
  document.body.appendChild(popup);
}

// ============================================================
//  TELEGRAM INIT
// ============================================================
function initTelegram() {
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0d0f1a');
    tg.setBackgroundColor('#0d0f1a');
    const user = tg.initDataUnsafe?.user;
    if (user) {
      G.player.name = user.first_name || 'Komutan';
    }
  }
}

// ============================================================
//  RESOURCE TICK (every 5 seconds passive income)
// ============================================================
function startResourceTick() {
  setInterval(() => {
    const goldTick = G.buildings.mine.level * 2;
    const foodTick = G.buildings.farm.level * 1;
    G.player.gold += goldTick;
    G.player.food += foodTick;
    G.player.lastOnline = Date.now();
    saveGame();
    updateTopBar();
  }, 5000);
}

// ============================================================
//  KEYBOARD SUPPORT
// ============================================================
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  // E = Saldır (savaş modalı açıksa)
  if (key === 'e') {
    const battleModal = document.getElementById('battle-modal');
    if (battleModal) {
      doBattle();
      return;
    }
    // E = Düşman listesindeyse ilk düşmana saldır
    const activeScreen = document.querySelector('.screen.active');
    if (activeScreen && activeScreen.id === 'screen-battle') {
      const firstEnemy = document.querySelector('.enemy-card');
      if (firstEnemy) firstEnemy.click();
      return;
    }
  }

  // ESC = Modalı kapat
  if (key === 'escape') {
    closeBattleModal();
    return;
  }

  // 1-5 = Tab geçişleri
  const tabMap = { '1': 'castle', '2': 'troops', '3': 'battle', '4': 'clan', '5': 'quests' };
  if (tabMap[e.key]) {
    switchTab(tabMap[e.key]);
  }
});

// ============================================================
//  INIT
// ============================================================
window.onload = () => {
  loadGame();
  initTelegram();

  // Init quest login
  const today = new Date().toDateString();
  if (!G.quests['q_login'] || G.quests['q_login'].date !== today) {
    G.quests['q_login'] = { progress: 1, claimed: false, date: today };
    saveGame();
  }

  // Idle income
  const earned = processIdleIncome();
  if (earned && (earned.gold > 10 || earned.food > 10)) {
    setTimeout(() => showIdlePopup(earned), 800);
  }

  renderAll();
  startResourceTick();
};
</script>
</body>
</html>
